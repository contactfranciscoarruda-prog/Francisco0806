<svg width="100%" viewBox="0 0 680 500" role="img" xmlns="http://www.w3.org/2000/svg">
<title>How we do it</title>
<desc>Five-stage ascending strategy on white studio background with soft shadows</desc>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FFFFFF"/>
    <stop offset="100%" stop-color="#F1EFEC"/>
  </linearGradient>
  <linearGradient id="pathG" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%" stop-color="#BBBBBB" stop-opacity="0.15"/>
    <stop offset="50%" stop-color="#777" stop-opacity="0.65"/>
    <stop offset="100%" stop-color="#BBBBBB" stop-opacity="0.25"/>
  </linearGradient>
  <linearGradient id="barG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#FAFAFA"/>
    <stop offset="100%" stop-color="#EEECEA"/>
  </linearGradient>
  <linearGradient id="capG" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C2C0BE"/>
    <stop offset="100%" stop-color="#9C9A98"/>
  </linearGradient>
  <linearGradient id="sh" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#C0BEBC" stop-opacity="0.28"/>
    <stop offset="100%" stop-color="#C0BEBC" stop-opacity="0"/>
  </linearGradient>
  <style>
    @keyframes up  {from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes lin {from{stroke-dashoffset:600;opacity:0}to{stroke-dashoffset:0;opacity:1}}
    @keyframes fi  {from{opacity:0}to{opacity:1}}
    @keyframes fl  {0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    @keyframes rg  {0%{r:5;opacity:0.28}100%{r:22;opacity:0}}
    @keyframes dp  {from{opacity:0;r:0}to{opacity:1;r:4}}
    @keyframes ar  {0%,100%{opacity:0.2;transform:translateX(0)}50%{opacity:0.55;transform:translateX(4px)}}
    @keyframes cp  {from{opacity:0;r:0}to{opacity:0.7;r:3}}
    @keyframes ce  {from{stroke-dashoffset:120;opacity:0}to{stroke-dashoffset:0;opacity:0.4}}
    .b1{animation:up .9s cubic-bezier(.22,1,.36,1) .2s both}
    .b2{animation:up .9s cubic-bezier(.22,1,.36,1) .55s both}
    .b3{animation:up .9s cubic-bezier(.22,1,.36,1) .9s both}
    .b4{animation:up .9s cubic-bezier(.22,1,.36,1) 1.25s both}
    .b5{animation:up .9s cubic-bezier(.22,1,.36,1) 1.6s both}
    .f1{animation:fl 5.2s ease-in-out 0s infinite}
    .f2{animation:fl 5.8s ease-in-out .7s infinite}
    .f3{animation:fl 4.9s ease-in-out 1.4s infinite}
    .f4{animation:fl 6.3s ease-in-out .3s infinite}
    .f5{animation:fl 5.5s ease-in-out 1.1s infinite}
    .pm{stroke-dasharray:600;animation:lin 2.2s cubic-bezier(.4,0,.2,1) .3s both}
    .pe{stroke-dasharray:600;animation:lin 2.2s cubic-bezier(.4,0,.2,1) .8s both}
    .r1{animation:rg 3s ease-out 1.3s infinite}
    .r2{animation:rg 3s ease-out 2.2s infinite}
    .r3{animation:rg 3s ease-out 3.1s infinite}
    .d1{animation:dp .5s ease-out .9s both}
    .d2{animation:dp .5s ease-out 1.25s both}
    .d3{animation:dp .5s ease-out 1.6s both}
    .d4{animation:dp .5s ease-out 1.95s both}
    .d5{animation:dp .5s ease-out 2.3s both}
    .cn1{animation:cp .5s ease-out 2.8s both}
    .cn2{animation:cp .5s ease-out 3.0s both}
    .cn3{animation:cp .5s ease-out 3.2s both}
    .cn4{animation:cp .5s ease-out 3.4s both}
    .ce1{stroke-dasharray:120;animation:ce .8s ease-out 2.9s both}
    .ce2{stroke-dasharray:120;animation:ce .8s ease-out 3.1s both}
    .ce3{stroke-dasharray:120;animation:ce .8s ease-out 3.3s both}
    .ce4{stroke-dasharray:120;animation:ce .8s ease-out 3.5s both}
    .aw{fill:none;stroke:#AAAAAA;stroke-width:.9;stroke-linecap:round;stroke-linejoin:round;opacity:0;animation:ar 2.2s ease-in-out 2.8s infinite}
    .lm{opacity:0;animation:fi .8s ease-out 3.6s both}
    .lr{opacity:0;animation:fi .6s ease-out 3.8s both}
    .hv{font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:500}
  </style>
</defs>

<rect width="680" height="500" fill="url(#bg)" rx="10"/>
<line x1="0" y1="345" x2="680" y2="345" stroke="#DDDBD8" stroke-width="0.5"/>

<ellipse cx="112" cy="347" rx="18" ry="4" fill="url(#sh)"/>
<ellipse cx="202" cy="347" rx="18" ry="4" fill="url(#sh)"/>
<ellipse cx="302" cy="347" rx="18" ry="4" fill="url(#sh)"/>
<ellipse cx="402" cy="347" rx="18" ry="4" fill="url(#sh)"/>
<ellipse cx="502" cy="347" rx="18" ry="4" fill="url(#sh)"/>

<line x1="80" y1="195" x2="620" y2="195" stroke="#DDDBD8" stroke-width="0.3" opacity="0.5"/>
<line x1="80" y1="245" x2="620" y2="245" stroke="#DDDBD8" stroke-width="0.3" opacity="0.5"/>
<line x1="80" y1="295" x2="620" y2="295" stroke="#DDDBD8" stroke-width="0.3" opacity="0.5"/>
<line x1="80" y1="330" x2="620" y2="330" stroke="#CCCAC7" stroke-width="0.5" opacity="0.5"/>

<polyline class="pe" fill="none" stroke="#CCCCCC" stroke-width="0.4" opacity="0.25" points="112,312 202,278 302,242 402,206 502,170 572,140"/>
<polyline class="pm" fill="none" stroke="url(#pathG)" stroke-width="1.2" points="112,308 202,274 302,238 402,202 502,166 572,136"/>

<circle class="r1" cx="112" cy="308" r="5" fill="none" stroke="#BBBBBB" stroke-width="0.5"/>
<circle class="r2" cx="302" cy="238" r="5" fill="none" stroke="#BBBBBB" stroke-width="0.5"/>
<circle class="r3" cx="502" cy="166" r="5" fill="none" stroke="#BBBBBB" stroke-width="0.5"/>

<g class="b1 f1">
  <rect x="100" y="250" width="24" height="80" rx="2" fill="url(#barG)" stroke="#DDDBD8" stroke-width="0.5"/>
  <rect x="100" y="306" width="24" height="10" rx="1" fill="url(#capG)" opacity="0.6"/>
  <text class="hv" font-size="8" fill="#BBBBBB" x="112" y="325" text-anchor="middle" letter-spacing="1">01</text>
</g>
<g class="b2 f2">
  <rect x="190" y="216" width="24" height="80" rx="2" fill="url(#barG)" stroke="#DDDBD8" stroke-width="0.5"/>
  <rect x="190" y="272" width="24" height="10" rx="1" fill="url(#capG)" opacity="0.6"/>
  <text class="hv" font-size="8" fill="#BBBBBB" x="202" y="291" text-anchor="middle" letter-spacing="1">02</text>
</g>
<g class="b3 f3">
  <rect x="290" y="180" width="24" height="80" rx="2" fill="url(#barG)" stroke="#DDDBD8" stroke-width="0.5"/>
  <rect x="290" y="236" width="24" height="10" rx="1" fill="url(#capG)" opacity="0.6"/>
  <text class="hv" font-size="8" fill="#BBBBBB" x="302" y="255" text-anchor="middle" letter-spacing="1">03</text>
</g>
<g class="b4 f4">
  <rect x="390" y="144" width="24" height="80" rx="2" fill="url(#barG)" stroke="#DDDBD8" stroke-width="0.5"/>
  <rect x="390" y="200" width="24" height="10" rx="1" fill="url(#capG)" opacity="0.6"/>
  <text class="hv" font-size="8" fill="#BBBBBB" x="402" y="219" text-anchor="middle" letter-spacing="1">04</text>
</g>
<g class="b5 f5">
  <rect x="490" y="108" width="24" height="80" rx="2" fill="url(#barG)" stroke="#DDDBD8" stroke-width="0.5"/>
  <rect x="490" y="164" width="24" height="10" rx="1" fill="url(#capG)" opacity="0.6"/>
  <text class="hv" font-size="8" fill="#BBBBBB" x="502" y="183" text-anchor="middle" letter-spacing="1">05</text>
</g>

<circle class="d1" cx="112" cy="308" r="4" fill="#999997"/>
<circle class="d2" cx="202" cy="274" r="4" fill="#999997"/>
<circle class="d3" cx="302" cy="238" r="4" fill="#999997"/>
<circle class="d4" cx="402" cy="202" r="4" fill="#999997"/>
<circle class="d5" cx="502" cy="166" r="4" fill="#999997"/>

<line class="ce1" x1="572" y1="136" x2="610" y2="112" fill="none" stroke="#AAAAAA" stroke-width="0.6"/>
<line class="ce2" x1="572" y1="136" x2="614" y2="158" fill="none" stroke="#AAAAAA" stroke-width="0.6"/>
<line class="ce3" x1="572" y1="136" x2="544" y2="110" fill="none" stroke="#AAAAAA" stroke-width="0.6"/>
<line class="ce4" x1="572" y1="136" x2="546" y2="160" fill="none" stroke="#AAAAAA" stroke-width="0.6"/>
<circle class="cn1" cx="610" cy="112" r="3" fill="#999997"/>
<circle class="cn2" cx="614" cy="158" r="3" fill="#999997"/>
<circle class="cn3" cx="544" cy="110" r="3" fill="#999997"/>
<circle class="cn4" cx="546" cy="160" r="3" fill="#999997"/>
<circle class="d5" cx="572" cy="136" r="5" fill="#888886"/>

<polyline class="aw" points="582,130 596,136 582,142"/>

<line x1="60" y1="68" x2="76" y2="68" stroke="#DDDBD8" stroke-width="0.5"/>
<line x1="60" y1="68" x2="60" y2="84" stroke="#DDDBD8" stroke-width="0.5"/>
<line x1="620" y1="68" x2="604" y2="68" stroke="#DDDBD8" stroke-width="0.5"/>
<line x1="620" y1="68" x2="620" y2="84" stroke="#DDDBD8" stroke-width="0.5"/>
<line x1="60" y1="432" x2="76" y2="432" stroke="#DDDBD8" stroke-width="0.5"/>
<line x1="60" y1="432" x2="60" y2="416" stroke="#DDDBD8" stroke-width="0.5"/>
<line x1="620" y1="432" x2="604" y2="432" stroke="#DDDBD8" stroke-width="0.5"/>
<line x1="620" y1="432" x2="620" y2="416" stroke="#DDDBD8" stroke-width="0.5"/>

<text class="hv b1" font-size="11" fill="#AAAAAA" letter-spacing="2.5" x="112" y="368" text-anchor="middle">Building</text>
<text class="hv b2" font-size="11" fill="#AAAAAA" letter-spacing="2.5" x="202" y="368" text-anchor="middle">Direction</text>
<text class="hv b3" font-size="11" fill="#AAAAAA" letter-spacing="2.5" x="302" y="368" text-anchor="middle">Execution</text>
<text class="hv b4" font-size="11" fill="#AAAAAA" letter-spacing="2.5" x="402" y="368" text-anchor="middle">Impact</text>
<text class="hv b5" font-size="11" fill="#AAAAAA" letter-spacing="2.5" x="502" y="368" text-anchor="middle">Connecting</text>

<line class="lr" x1="230" y1="408" x2="450" y2="408" stroke="#DDDBD8" stroke-width="0.4"/>
<text class="hv lm" font-size="13" fill="#BBBBBB" letter-spacing="6" x="340" y="430" text-anchor="middle">How we do it</text>
</svg>
